services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - test-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "19092:19092"
    depends_on:
      - zookeeper
    networks:
      - test-net

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: test-org
      DOCKER_INFLUXDB_INIT_BUCKET: marketdata
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: marketdata-token
    ports:
      - "8086:8086"
    volumes:
      - ./.influxdb2:/var/lib/influxdb2
    networks:
      - test-net

  market-bridge:
    build:
      context: .
    container_name: market-bridge
    environment:
      KRAKEN_WS_URL: wss://ws.kraken.com/v2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: kraken-market-data
      KRAKEN_CHANNEL: ticker
      KRAKEN_SYMBOLS: BTC/USD,ETH/USD,XRP/USD
      KRAKEN_BOOK_DEPTH: "10"
      LOG_LEVEL: DEBUG
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: marketdata-token
      INFLUXDB_ORG: test-org
      INFLUXDB_BUCKET: marketdata
    depends_on:
      - kafka
      - influxdb
    restart: unless-stopped
    networks:
      - test-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.prometheus:/prometheus
    depends_on:
      - kafka-exporter
      - node-exporter
      - cadvisor
      - influxdb
    networks:
      - test-net

  grafana:
    image: grafana/grafana-oss:11.1.4
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin12345
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./.grafana:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - influxdb
    networks:
      - test-net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro
    networks:
      - test-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - test-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - test-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8088:8080"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - test-net

networks:
  test-net:
    name: test-net
