filebeat.inputs:
  - type: filestream
    id: market-bridge-json
    paths:
      - /var/log/market-bridge/market-bridge.jsonl
    parsers:
      - ndjson:
          overwrite_keys: true
          add_error_key: true

processors:
  - add_fields:
      target: ""
      fields:
        service_name: market-bridge
        data_source: elasticsearch

output.elasticsearch:
  hosts:
    - http://elasticsearch:9200
  index: market-bridge-logs-%{+yyyy.MM.dd}

setup.ilm.enabled: false
setup.template.enabled: true
setup.template.overwrite: true
setup.template.name: market-bridge-logs
setup.template.pattern: market-bridge-logs-*
