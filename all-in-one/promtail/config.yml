server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: market-bridge
    static_configs:
      - targets:
          - localhost
        labels:
          job: market-bridge
          service: market-bridge
          __path__: /var/log/market-bridge/market-bridge.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
      - labels:
          level: ""
          logger: ""
