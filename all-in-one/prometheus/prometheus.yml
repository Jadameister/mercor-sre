global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - localhost:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - localhost:8080

  - job_name: kafka-exporter
    static_configs:
      - targets:
          - localhost:9308

  - job_name: influxdb
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:8086

  - job_name: synthetic-elasticsearch-exporter
    honor_labels: true
    static_configs:
      - targets:
          - localhost:9314
